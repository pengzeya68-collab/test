name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Ruff check
        run: ruff check fastapi_backend/ --output-format=github

      - name: Ruff format check
        run: ruff format fastapi_backend/ --check

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ --max-warnings 0 || true

      - name: Build check
        run: npm run build

  deploy:
    name: Deploy to Server
    needs: [lint-backend, lint-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/TestMasterProject
            echo ">>> Pulling latest code..."
            git pull origin main
            echo ">>> Rebuilding and restarting Docker services..."
            docker compose up -d --build
            echo ">>> Cleaning old images..."
            docker image prune -f
            echo ">>> Waiting for services to start..."
            sleep 15
            echo ">>> Service status:"
            docker compose ps
            HEALTH=$(curl -s http://localhost:5001/api/health)
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "✅ Deployment successful - backend is healthy"
            else
              echo "❌ Deployment may have issues - backend health check failed"
              echo "Response: $HEALTH"
              docker compose logs backend --tail 20
              exit 1
            fi
