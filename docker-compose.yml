x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-resource-limits: &default-resources
  limits:
    cpus: "2.0"
    memory: 1G
  reservations:
    cpus: "0.25"
    memory: 256M

services:
  postgres:
    image: postgres:16-alpine
    container_name: testmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: testmaster
      POSTGRES_USER: testmaster
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
    # 生产环境建议移除端口映射，仅通过 Docker 内部网络访问
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testmaster"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testmaster-net
    logging: *default-logging
    deploy:
      resources:
        <<: *default-resources

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testmaster-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://testmaster:${DB_PASSWORD}@postgres:5432/testmaster
      - AUTO_CREATE_TABLES_ON_STARTUP=true
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - backend_data:/app/instance
      - autotest_data:/app/fastapi_backend/autotest_data
      - backup_data:/app/backups
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - testmaster-net
    logging: *default-logging
    deploy:
      resources:
        <<: *default-resources

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testmaster-celery
    restart: unless-stopped
    command: celery -A fastapi_backend.tasks worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://testmaster:${DB_PASSWORD}@postgres:5432/testmaster
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - backend_data:/app/instance
      - autotest_data:/app/fastapi_backend/autotest_data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A fastapi_backend.tasks inspect ping --timeout 10 2>/dev/null"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - testmaster-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: testmaster-redis
    restart: unless-stopped
    # 生产环境建议移除端口映射，仅通过 Docker 内部网络访问
    # 如需密码保护，取消下面 command 的注释，并在 .env 中设置 REDIS_PASSWORD
    # 同时更新 backend/celery 的 REDIS_URL 为 redis://:password@redis:6379/0
    ports:
      - "127.0.0.1:6379:6379"
    # command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - testmaster-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  nginx:
    image: nginx:alpine
    container_name: testmaster-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - autotest_data:/usr/share/nginx/autotest_data:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/health || curl -sf http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - testmaster-net
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

networks:
  testmaster-net:
    driver: bridge

volumes:
  redis_data:
  pg_data:
  backend_data:
  autotest_data:
  backup_data:
