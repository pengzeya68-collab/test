services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testmaster-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/instance/testmaster.db
      - AUTO_CREATE_TABLES_ON_STARTUP=true
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./instance:/app/instance
      - ./fastapi_backend/autotest_data:/app/fastapi_backend/autotest_data
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - testmaster-net

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testmaster-celery
    restart: unless-stopped
    command: celery -A fastapi_backend.tasks worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/instance/testmaster.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./instance:/app/instance
      - ./fastapi_backend/autotest_data:/app/fastapi_backend/autotest_data
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - testmaster-net

  redis:
    image: redis:7-alpine
    container_name: testmaster-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - testmaster-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: testmaster-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - testmaster-net

networks:
  testmaster-net:
    driver: bridge

volumes:
  redis_data:
