[pytest]
pythonpath = .
testpaths =
    fastapi_backend/tests
    tests
addopts = --strict-markers -m "not remote"
markers =
    remote: tests that call deployed remote services and require explicit opt-in
    regression: end-to-end regression tests
    slow: slow-running tests
    external: tests that depend on external network or third-party services
    destructive: tests that create, update, or delete remote data
    smoke: small remote verification subset
    jmeter: JMeter-related tests
    ai: tests that depend on AI services
    sandbox: sandbox execution tests
